.ins-card .val{font-size:19px;font-weight:800;margin-bottom:2px}
.ins-card .sub{font-size:11px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bord);font-weight:700}
td{padding:7px 10px;border-bottom:1px solid #0d1830}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.bar-mini{height:6px;background:var(--bord);border-radius:3px;width:80px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-fill{height:100%;border-radius:3px}
input[type=text]{width:100%;padding:9px 14px;background:var(--surf);border:1px solid var(--bord);border-radius:8px;color:#e2e8f0;font-size:13px;margin-bottom:12px;outline:none;font-family:inherit}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;max-height:220px;overflow-y:auto;margin-bottom:16px}
.student-btn{background:var(--surf);border:1px solid var(--bord);color:#e2e8f0;padding:8px 11px;border-radius:8px;cursor:pointer;text-align:left;font-size:11px;line-height:1.5;font-family:inherit;transition:all .15s}
.student-btn.sel{background:rgba(59,130,246,.15);border-color:var(--blue);color:#60a5fa}

.heatmap-wrap{overflow-x:auto}
.heatmap-wrap table td{width:42px;height:22px;text-align:center;font-weight:700;font-size:10px;border:1px solid #07090f}

// ── helpers ──────────────────────────────────────────────
const avg=a=>{const v=a.filter(x=>x!=null);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null};
const sAvg=s=>{const t=SK.map(k=>s.subjects[k].term).filter(x=>x!=null);return t.length?+(avg(t).toFixed(1)):0};
const gc=v=>v>=75?'#22c55e':v>=60?'#3b82f6':v>=40?'#f59e0b':'#ef4444';
const grade=v=>v>=90?'A+':v>=75?'A':v>=60?'B+':v>=50?'B':v>=40?'C+':'C';
const tA=SK.map(k=>avg(STUDENTS.map(s=>s.subjects[k].term)));
const mA=SK.map(k=>avg(STUDENTS.map(s=>s.subjects[k].midterm)));
const sA=SK.map(k=>avg(STUDENTS.map(s=>s.subjects[k].sa)));
const allT=STUDENTS.flatMap(s=>SK.map(k=>s.subjects[k].term).filter(x=>x!=null));
const classAvg=(allT.reduce((a,b)=>a+b,0)/allT.length).toFixed(1);
const sorted=[...STUDENTS].sort((a,b)=>sAvg(b)-sAvg(a));

// ── stats bar ────────────────────────────────────────────
const statsData=[
  ['42','Students','#e2e8f0'],
  ['9','Subjects','#e2e8f0'],
  [classAvg,'Class Avg /100','#f59e0b'],
  [allT.filter(v=>v>=75).length,'Distinctions ≥75','#22c55e'],
  [allT.filter(v=>v<40).length,'Scores < 40','#ef4444'],
  [sorted[0].name.split(' ')[0],'Top Student','#60a5fa']
];
document.getElementById('statsbar').innerHTML=statsData.map(([v,l,c])=>
  `<div class="stat"><div class="val" style="color:${c}">${v}</div><div class="lbl">${l}</div></div>`
).join('');

// ── chart registry ────────────────────────────────────────
const charts={};
function mkChart(id,cfg){
  if(charts[id])charts[id].destroy();
  const c=document.getElementById(id);
  if(!c)return;
  charts[id]=new Chart(c,cfg);
}

function barCfg(labels,datasets,max,pct=false){
  return{type:'bar',data:{labels,datasets:datasets.map(d=>({
    label:d.label,data:d.data,
    backgroundColor:Array.isArray(d.bg)?d.bg.map(c=>c+'cc'):d.bg+'cc',
    borderColor:Array.isArray(d.bg)?d.bg:d.bg,
    borderWidth:1.5,borderRadius:5
  }))},options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
    plugins:{legend:{display:datasets.length>1,labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},
    scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}},
            y:{max,beginAtZero:true,ticks:{color:'#64748b',callback:v=>pct?v+'%':v},grid:{color:'#1e293b'}}}}};
}

let ovMode='term';
function buildOverview(){
  const dist=[0,0,0,0,0];
  allT.forEach(v=>{dist[v<=20?0:v<=40?1:v<=60?2:v<=80?3:4]++;});
  const top6=sorted.slice(0,6);
  const bot5=[...sorted].reverse().slice(0,5);

  document.getElementById('overview').innerHTML=`
  <div class="pills" id="ov-pills">
    ${[['term','Term /100'],['mid','Midterm /15'],['sa','SA /30'],['cmp','Midterm vs SA']].map(([k,l])=>
      `<button class="pill${ovMode===k?' on':''}" onclick="setOvMode('${k}')">${l}</button>`).join('')}
  </div>
  <div class="grid2">
    <div class="box"><div class="box-title" id="ov-title">Subject-wise Class Average</div>
      <div class="chart-wrap" style="height:250px"><canvas id="ov-bar"></canvas></div></div>
    <div class="box"><div class="box-title">Term Score Distribution</div>
      <div class="chart-wrap" style="height:250px"><canvas id="ov-dist"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="box"><div class="box-title">🏆 Top 6 Students</div>
      ${top6.map((s,i)=>rankItem(i+1,s.name.split(' ').slice(0,2).join(' '),'',sAvg(s),'#f59e0b')).join('')}</div>
    <div class="box"><div class="box-title">⚠️ Needs Support</div>
      ${bot5.map((s,i)=>rankItem(i+1,s.name.split(' ').slice(0,2).join(' '),'',sAvg(s),'#ef4444')).join('')}</div>
  </div>`;

  mkChart('ov-dist',barCfg(['0–20','21–40','41–60','61–80','81–100'],[{label:'Count',data:dist,bg:['#ef4444','#f97316','#f59e0b','#3b82f6','#22c55e']}],Math.max(...dist)+8));
  renderOvBar();
}

function renderOvBar(){
  let cfg;
  if(ovMode==='cmp'){
    cfg=barCfg(SS,[
      {label:'Midterm %',data:mA.map(v=>v!=null?+(v/15*100).toFixed(1):null),bg:'#f59e0b'},
      {label:'SA %',data:sA.map(v=>v!=null?+(v/30*100).toFixed(1):null),bg:'#3b82f6'}
    ],100,true);
    document.getElementById('ov-title').textContent='Midterm % vs SA % — All Subjects';
  } else {
    const data=ovMode==='term'?tA:ovMode==='mid'?mA:sA;
    const pData=ovMode==='term'?tA:ovMode==='mid'?mA.map(v=>v/15*100):sA.map(v=>v/30*100);
    const max=ovMode==='term'?100:ovMode==='mid'?15:30;
    cfg=barCfg(SS,[{label:'Avg',data,bg:pData.map(v=>gc(v||0))}],max);
    document.getElementById('ov-title').textContent='Subject-wise Class Average';
  }
  mkChart('ov-bar',cfg);
}

function setOvMode(m){
  ovMode=m;
  document.querySelectorAll('#ov-pills .pill').forEach((b,i)=>{
    b.classList.toggle('on',['term','mid','sa','cmp'][i]===m);
  });
  renderOvBar();
}

let subIdx=0;
function buildSubject(){
  document.getElementById('subject').innerHTML=`
  <div class="pills" id="sub-pills">

    <div class="chart-wrap" style="height:230px"><canvas id="sub-cmp"></canvas></div></div>`;

  mkChart('sub-cmp',barCfg(SS,[
    {label:'Midterm %',data:mA.map(v=>+(v/15*100).toFixed(1)),bg:'#f59e0b'},

  ],100,true));

function renderSubj(){
  const k=SK[subIdx];
  const top=STUDENTS.map(s=>{const d=s.subjects[k];return d.term!=null?{...s,t:d.term,m:d.midterm,sa:d.sa}:null})
    .filter(Boolean).sort((a,b)=>b.t-a.t).slice(0,8);
  document.getElementById('sub-list-title').textContent=`Top Students — ${SS[subIdx]}`;
  document.getElementById('sub-list').innerHTML=top.map((s,i)=>
    rankItem(i+1,s.name.split(' ').slice(0,2).join(' '),`M:${s.m??'AB'} · SA:${s.sa??'AB'}`,s.t,'#f59e0b')).join('');

  document.getElementById('sub-scat-title').textContent=`Midterm vs SA — ${SS[subIdx]}`;
  const pts=STUDENTS.map(s=>{const d=s.subjects[k];return d.midterm!=null&&d.sa!=null?{x:d.midterm,y:d.sa,n:s.name.split(' ')[0]}:null}).filter(Boolean);
  mkChart('sub-scat',{type:'scatter',data:{datasets:[{data:pts,backgroundColor:'#a855f799',borderColor:'#a855f7',borderWidth:1,pointRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw.n}: M=${c.raw.x} SA=${c.raw.y}`}}},
      scales:{x:{min:0,max:15,title:{display:true,text:'Midterm',color:'#64748b'},ticks:{color:'#64748b'},grid:{color:'#1e293b'}},
              y:{min:0,max:30,title:{display:true,text:'SA',color:'#64748b'},ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});
}

function setSubj(i){
  subIdx=i;
  document.querySelectorAll('#sub-pills .pill').forEach((b,j)=>b.classList.toggle('on',j===i));
  renderSubj();
}

  const f=STUDENTS.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('stu-grid').innerHTML=f.map(s=>
    `<button class="student-btn${selRoll===s.roll?' sel':''}" onclick="selectStudent(${s.roll})">
      <div class="roll">Roll ${s.roll}</div>${s.name.split(' ').slice(0,2).join(' ')}
    </button>`).join('');
}

function selectStudent(roll){
  selRoll=roll;
  renderStudentGrid(document.getElementById('stu-search').value);
  const s=STUDENTS.find(x=>x.roll===roll);
  const mPct=SK.map(k=>s.subjects[k].midterm!=null?+(s.subjects[k].midterm/15*100).toFixed(1):null);
  const sPct=SK.map(k=>s.subjects[k].sa!=null?+(s.subjects[k].sa/30*100).toFixed(1):null);
  const radar=SK.map(k=>s.subjects[k].term??0);

  document.getElementById('stu-detail').innerHTML=`
  <div style="font-size:17px;font-weight:800;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bord)">
    <span style="color:#60a5fa;margin-right:8px">#${s.roll}</span>${s.name}
    <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:10px">Avg: ${sAvg(s)}/100</span>
  </div>
  <div class="grid2">
    <div class="box"><div class="box-title">Midterm % vs SA % by Subject</div>
      <div class="chart-wrap" style="height:250px"><canvas id="stu-bar"></canvas></div></div>
    <div class="box"><div class="box-title">Performance Radar (Term)</div>
      <div class="chart-wrap" style="height:250px"><canvas id="stu-radar"></canvas></div></div>
  </div>
  <div class="box"><div class="box-title">Score Breakdown</div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr><th>Subject</th><th>Midterm /15</th><th>SA /30</th><th>Term /100</th><th>Grade</th><th>Progress</th></tr></thead>
      <tbody>${SK.map((k,i)=>{
        const d=s.subjects[k]; if(d.term==null&&d.midterm==null)return'';
        const c=gc(d.term||0);
        return`<tr>
          <td style="font-weight:600">${SS[i]}</td>
          <td style="color:#f59e0b">${d.midterm??'<span style="color:#334155">AB</span>'}</td>
          <td style="color:#3b82f6">${d.sa??'<span style="color:#334155">AB</span>'}</td>
          <td style="color:${c};font-weight:800">${d.term??'<span style="color:#334155">—</span>'}</td>
          <td>${d.term?`<span class="badge" style="background:${c}22;color:${c}">${grade(d.term)}</span>`:''}</td>
          <td>${d.term!=null?`<div class="bar-mini"><div class="bar-fill" style="width:${d.term}%;background:${c}"></div></div>`:''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;

  mkChart('stu-bar',barCfg(SS,[
    {label:'Midterm %',data:mPct,bg:'#f59e0b'},
    {label:'SA %',data:sPct,bg:'#3b82f6'}
  ],100,true));

  mkChart('stu-radar',{type:'radar',data:{labels:SS,datasets:[{data:radar,fill:true,
    backgroundColor:'rgba(245,158,11,.12)',borderColor:'#f59e0b',borderWidth:2,pointBackgroundColor:'#f59e0b',pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},plugins:{legend:{display:false}},
      scales:{r:{min:0,max:100,ticks:{stepSize:25,color:'#64748b',backdropColor:'transparent'},
        grid:{color:'#1e293b'},pointLabels:{color:'#94a3b8',font:{size:10}},angleLines:{color:'#1e293b'}}}}});
}

// ── HEATMAP PAGE ─────────────────────────────────────────
let hmMode='term';
function buildHeatmap(){
  document.getElementById('heatmap').innerHTML=`
  <div class="pills" id="hm-pills">
    ${[['term','Term /100'],['midterm','Midterm /15'],['sa','SA /30']].map(([k,l])=>
      `<button class="pill${hmMode===k?' on':''}" onclick="setHm('${k}')">${l}</button>`).join('')}
  </div>
  <div class="box"><div class="heatmap-wrap"><div id="hm-table"></div></div></div>`;
  renderHeatmap();
}

function renderHeatmap(){
  const max=hmMode==='term'?100:hmMode==='midterm'?15:30;
  const bg=v=>{
    if(v==null)return'#0a0f1a';
    const p=v/max;
    if(p>=.85)return'#14532d';if(p>=.7)return'#166534';if(p>=.55)return'#1e3a5f';
    if(p>=.4)return'#172554';if(p>=.25)return'#7c2d12';return'#450a0a';
  };
  const fg=v=>{
    if(v==null)return'#1e293b';const p=v/max;
    return p>=.7?'#4ade80':p>=.4?'#93c5fd':p>=.25?'#fcd34d':'#fca5a5';
  };
  const field=hmMode;
  let html=`<table><thead><tr><th style="width:155px;min-width:155px"></th>
    ${SS.map(s=>`<th style="writing-mode:vertical-rl;transform:rotate(180deg);height:65px;padding:2px 3px;color:#64748b;font-size:9px;text-align:left;white-space:nowrap">${s}</th>`).join('')}
  </tr></thead><tbody>`;
  STUDENTS.forEach(s=>{
    html+=`<tr><td style="padding:2px 8px;color:#94a3b8;font-size:10px;white-space:nowrap;border-right:1px solid #1e293b;max-width:155px;overflow:hidden;text-overflow:ellipsis">
      <span style="color:#f59e0b;margin-right:4px;font-size:9px">${s.roll}</span>${s.name.split(' ').slice(0,2).join(' ')}</td>
      ${SK.map(k=>{const v=s.subjects[k][field];return`<td style="background:${bg(v)};color:${fg(v)}">${v??''}</td>`;}).join('')}
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('hm-table').innerHTML=html;
}

function setHm(m){
  hmMode=m;
  document.querySelectorAll('#hm-pills .pill').forEach((b,i)=>b.classList.toggle('on',['term','midterm','sa'][i]===m));
  renderHeatmap();
}

// ── INSIGHTS PAGE ─────────────────────────────────────────
function buildInsights(){
  const bi=tA.reduce((b,v,i)=>(v??0)>=(tA[b]??0)?i:b,0);
  const wi=tA.reduce((b,v,i)=>(v??99)<=(tA[b]??99)?i:b,0);
  const top=sorted[0],bot=[...sorted].pop();
  const bands=[
    {l:'A+ ≥90',n:allT.filter(v=>v>=90).length,c:'#22c55e'},
    {l:'A 75–89',n:allT.filter(v=>v>=75&&v<90).length,c:'#3b82f6'},
    {l:'B 60–74',n:allT.filter(v=>v>=60&&v<75).length,c:'#f59e0b'},
    {l:'C 40–59',n:allT.filter(v=>v>=40&&v<60).length,c:'#f97316'},
    {l:'D <40',n:allT.filter(v=>v<40).length,c:'#ef4444'},
  ];
  const cards=[
    {l:'Class Average',v:classAvg+'/100',s:'Across all subjects & students',ac:'#f59e0b'},
    {l:'Best Subject',v:SS[bi],s:`Avg ${tA[bi]?.toFixed(1)}/100`,ac:'#22c55e'},
    {l:'Weakest Subject',v:SS[wi],s:`Avg ${tA[wi]?.toFixed(1)}/100`,ac:'#ef4444'},
    {l:'Top Student',v:top.name.split(' ').slice(0,2).join(' '),s:`${sAvg(top)}/100`,ac:'#3b82f6'},
    {l:'Needs Attention',v:sorted[sorted.length-1].name.split(' ').slice(0,2).join(' '),s:`${sAvg(sorted[sorted.length-1])}/100`,ac:'#f43f5e'},
    {l:'Scores ≥ 75',v:allT.filter(v=>v>=75).length,s:'Distinction level',ac:'#22c55e'},
    {l:'Scores < 40',v:allT.filter(v=>v<40).length,s:'Need urgent support',ac:'#ef4444'},
    {l:'Scores ≥ 90',v:allT.filter(v=>v>=90).length,s:'Outstanding marks',ac:'#a855f7'},
  ];
  const minT=SK.map(k=>{const v=STUDENTS.map(s=>s.subjects[k].term).filter(x=>x!=null);return v.length?Math.min(...v):null});
  const maxT=SK.map(k=>{const v=STUDENTS.map(s=>s.subjects[k].term).filter(x=>x!=null);return v.length?Math.max(...v):null});

  document.getElementById('insights').innerHTML=`
  <div class="grid-auto">
    ${cards.map(c=>`<div class="ins-card" style="border-left:3px solid ${c.ac}">
      <div class="lbl">${c.l}</div><div class="val">${c.v}</div><div class="sub">${c.s}</div>
    </div>`).join('')}
  </div>
  <div class="grid2">
    <div class="box"><div class="box-title">Grade Band Distribution</div>
      <div class="chart-wrap" style="height:250px"><canvas id="ins-bands"></canvas></div></div>
    <div class="box"><div class="box-title">Subject Range: Min / Avg / Max</div>
      <div class="chart-wrap" style="height:250px"><canvas id="ins-range"></canvas></div></div>
  </div>`;

  mkChart('ins-bands',barCfg(bands.map(b=>b.l),[{label:'Count',data:bands.map(b=>b.n),bg:bands.map(b=>b.c)}],Math.max(...bands.map(b=>b.n))+10));
  mkChart('ins-range',barCfg(SS,[
    {label:'Min',data:minT,bg:'#ef4444'},
    {label:'Avg',data:tA.map(v=>v!=null?+v.toFixed(1):null),bg:'#f59e0b'},
    {label:'Max',data:maxT,bg:'#22c55e'}
  ],100));
}

// ── helpers ──────────────────────────────────────────────
function rankItem(rank,name,sub,score,color){
  const m={1:'linear-gradient(135deg,#ffd700,#f97316)',2:'linear-gradient(135deg,#cbd5e1,#94a3b8)',3:'linear-gradient(135deg,#cd7f32,#92400e)'};
  const bg=m[rank]||'#1e293b';const fc=rank<=3?'#000':'#64748b';
  return`<div class="rank-item">
    <div class="medal" style="background:${bg};color:${fc}">${rank}</div>
    <div style="flex:1;min-width:0"><div class="rank-name">${name}</div>${sub?`<div class="rank-sub">${sub}</div>`:''}</div>
    <div class="rank-score" style="color:${color}">${score}</div>
  </div>`;
}

// ── page routing ──────────────────────────────────────────
const builders={overview:buildOverview,subject:buildSubject,student:buildStudent,heatmap:buildHeatmap,insights:buildInsights};
const built={};
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(!built[id]){builders[id]();built[id]=true;}
}

// init
buildOverview();
built['overview']=true;
</script>
</body>
</html>
